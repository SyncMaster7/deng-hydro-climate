# deng-hydro-climate — docker-compose.yml
# Airflow 3.2.1 + dbt-postgres + pgduckdb analytics DB + Apache Superset + DataHub
# All passwords and secrets via .env — never hardcode here
#
# Ports in use:
#   5432  — analytics-db (PostgreSQL)
#   5433  — airflow-db (PostgreSQL)
#   5434  — superset-db (PostgreSQL)
#   8080  — Airflow UI + REST API
#   8088  — Superset UI
#   8090  — DataHub GMS (metadata REST API)
#   9002  — DataHub Frontend (UI)
#   9092  — Kafka broker

x-airflow-common: &airflow-common
  build: ./docker/airflow
  restart: unless-stopped
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-db:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW_CONN_ANALYTICS_DB: postgresql+psycopg2://${ANALYTICS_DB_USER}:${ANALYTICS_DB_PASSWORD}@analytics-db:5432/${ANALYTICS_DB_NAME}
    DBT_ANALYTICS_HOST: analytics-db
    DBT_ANALYTICS_PORT: "5432"
    DBT_ANALYTICS_USER: ${ANALYTICS_DB_USER}
    DBT_ANALYTICS_PASSWORD: ${ANALYTICS_DB_PASSWORD}
    DBT_ANALYTICS_DB: ${ANALYTICS_DB_NAME}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./dbt_project:/opt/airflow/dbt_project
    - ./dbt_project/profiles.yml:/home/airflow/.dbt/profiles.yml:ro
    - ./ingestion:/opt/airflow/ingestion
    - ./seeds:/opt/airflow/seeds
    - /data/raw:/data/raw
    - /data/archive:/data/archive
  depends_on:
    airflow-db:
      condition: service_healthy
  user: "${AIRFLOW_UID:-50000}:0"

volumes:
  # DataHub named volumes — persist DataHub internal state across restarts
  datahub-broker:
  datahub-zookeeper:
  datahub-elasticsearch:
  datahub-mysql:

services:

  # ---------------------------------------------------------------------------
  # Analytics database — application data (hydro + climate)
  # ---------------------------------------------------------------------------
  analytics-db:
    image: pgduckdb/pgduckdb:16-v1.1.1
    container_name: deng-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - /data/volumes/postgres_data:/var/lib/postgresql/data
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Airflow metadata database — internal Airflow state only
  # ---------------------------------------------------------------------------
  airflow-db:
    image: postgres:16
    container_name: deng-airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - /data/volumes/airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Airflow init — runs once to migrate DB and create admin user
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: deng-airflow-init
    restart: "no"
    user: "50000:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow fab-db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true
    depends_on:
      airflow-db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Airflow API server — UI + REST API
  # ---------------------------------------------------------------------------
  airflow-apiserver:
    <<: *airflow-common
    container_name: deng-airflow-apiserver
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow scheduler — evaluates DAGs and triggers tasks
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: deng-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--local"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow DAG processor — parses DAG files
  # ---------------------------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: deng-airflow-dag-processor
    command: dag-processor
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow triggerer — handles deferred tasks and sensors
  # ---------------------------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    container_name: deng-airflow-triggerer
    command: triggerer
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # dbt — dedicated container for interactive dbt development
  # stays running so you can: docker compose exec dbt dbt run
  # ---------------------------------------------------------------------------
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.latest
    container_name: deng-dbt
    restart: unless-stopped
    entrypoint: ["tail", "-f", "/dev/null"]
    working_dir: /dbt
    environment:
      DBT_ANALYTICS_HOST: analytics-db
      DBT_ANALYTICS_PORT: "5432"
      DBT_ANALYTICS_USER: ${ANALYTICS_DB_USER}
      DBT_ANALYTICS_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      DBT_ANALYTICS_DB: ${ANALYTICS_DB_NAME}
    volumes:
      - ./dbt_project:/dbt
      - ./dbt_project/profiles.yml:/root/.dbt/profiles.yml:ro
    depends_on:
      analytics-db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Superset metadata database — internal Superset state only
  # ---------------------------------------------------------------------------
  superset-db:
    image: postgres:16
    container_name: deng-superset-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SUPERSET_DB_USER}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD}
      POSTGRES_DB: ${SUPERSET_DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5434:5432"
    volumes:
      - /data/volumes/superset_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPERSET_DB_USER} -d ${SUPERSET_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Superset init — runs once to migrate DB and create admin user
  # ---------------------------------------------------------------------------
  superset-init:
    build: ./docker/superset
    container_name: deng-superset-init
    restart: "no"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_USER: ${SUPERSET_DB_USER}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    volumes:
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    command:
      - /bin/bash
      - -c
      - |
        superset db upgrade &&
        superset init &&
        superset fab create-admin \
          --username ${SUPERSET_ADMIN_USER} \
          --password ${SUPERSET_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --email ${SUPERSET_ADMIN_EMAIL} || true
    depends_on:
      superset-db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Superset — dashboards and visualisation
  # ---------------------------------------------------------------------------
  superset:
    build: ./docker/superset
    container_name: deng-superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_USER: ${SUPERSET_DB_USER}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME}
    ports:
      - "8088:8088"
    volumes:
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      superset-db:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================================================
  # DATAHUB — metadata platform
  # UI:  http://192.168.1.93:9002  (login: datahub / datahub)
  # GMS: http://192.168.1.93:8090  (REST API — used by ingestion recipes)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # DataHub ZooKeeper — Kafka coordination
  # ---------------------------------------------------------------------------
  datahub-zookeeper:
    image: confluentinc/cp-zookeeper:7.9.2
    container_name: deng-datahub-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - datahub-zookeeper:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # DataHub Kafka broker — event streaming backbone
  # ---------------------------------------------------------------------------
  datahub-broker:
    image: confluentinc/cp-kafka:7.9.2
    container_name: deng-datahub-broker
    restart: unless-stopped
    depends_on:
      datahub-zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://datahub-broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: -Xms512m -Xmx512m
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_MAX_MESSAGE_BYTES: 5242880
    ports:
      - "9092:9092"
    volumes:
      - datahub-broker:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # DataHub Schema Registry — Kafka schema management
  # ---------------------------------------------------------------------------
  datahub-schema-registry:
    image: confluentinc/cp-schema-registry:7.9.2
    container_name: deng-datahub-schema-registry
    restart: unless-stopped
    depends_on:
      datahub-broker:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: datahub-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: datahub-broker:29092
    healthcheck:
      test: ["CMD-SHELL", "curl -s --fail http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # DataHub Elasticsearch — search and graph index
  # ---------------------------------------------------------------------------
  datahub-elasticsearch:
    image: elasticsearch:7.10.1
    container_name: deng-datahub-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    volumes:
      - datahub-elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --fail http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=0s"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # DataHub MySQL — DataHub internal metadata store
  # NOTE: this is DataHub's own store, completely separate from analytics-db
  # ---------------------------------------------------------------------------
  datahub-mysql:
    image: mysql:8.2
    container_name: deng-datahub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: datahub
      MYSQL_USER: datahub
      MYSQL_PASSWORD: datahub
      MYSQL_ROOT_PASSWORD: datahub
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    volumes:
      - datahub-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u datahub -pdatahub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # DataHub MySQL Setup — one-shot container that creates the MySQL schema
  # (metadata_aspect_v2 and related tables) before GMS or upgrade start
  # ---------------------------------------------------------------------------
  datahub-mysql-setup:
    image: acryldata/datahub-mysql-setup:head
    container_name: deng-datahub-mysql-setup
    restart: "no"
    depends_on:
      datahub-mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: datahub-mysql
      MYSQL_PORT: "3306"
      MYSQL_USERNAME: datahub
      MYSQL_PASSWORD: datahub
      DATAHUB_DB_NAME: datahub

  # ---------------------------------------------------------------------------
  # DataHub Elasticsearch Setup — one-shot container that creates ES indices
  # ---------------------------------------------------------------------------
  datahub-elasticsearch-setup:
    image: acryldata/datahub-elasticsearch-setup:head
    container_name: deng-datahub-elasticsearch-setup
    restart: "no"
    depends_on:
      datahub-elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_USE_SSL: "false"

  # ---------------------------------------------------------------------------
  # DataHub Kafka Setup — one-shot container that creates Kafka topics
  # ---------------------------------------------------------------------------
  datahub-kafka-setup:
    image: acryldata/datahub-kafka-setup:head
    container_name: deng-datahub-kafka-setup
    restart: "no"
    depends_on:
      datahub-broker:
        condition: service_healthy
      datahub-schema-registry:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181

  # ---------------------------------------------------------------------------
  # DataHub Upgrade — runs SystemUpdate steps after schema is ready
  # Depends on all three setup containers completing successfully first
  # ---------------------------------------------------------------------------
  datahub-upgrade:
    image: acryldata/datahub-upgrade:v1.5.0.3
    container_name: deng-datahub-upgrade
    restart: "no"
    command: ["-u", "SystemUpdate"]
    depends_on:
      datahub-mysql-setup:
        condition: service_completed_successfully
      datahub-elasticsearch-setup:
        condition: service_completed_successfully
      datahub-kafka-setup:
        condition: service_completed_successfully
    environment:
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_URL: jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8&enabledTLSProtocols=TLSv1.2
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      GRAPH_SERVICE_IMPL: elasticsearch
      DATAHUB_SQL_SETUP_ENABLED: "true"
      DATAHUB_TOKEN_SERVICE_SIGNING_KEY: ${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      DATAHUB_TOKEN_SERVICE_SALT: ${DATAHUB_TOKEN_SERVICE_SALT}

  # ---------------------------------------------------------------------------
  # DataHub GMS — backend metadata service (REST API)
  # Exposed on 8090 (8080 is taken by Airflow)
  # Also reachable by ingestion recipes as http://datahub-gms:8080 internally
  # ---------------------------------------------------------------------------
  datahub-gms:
    image: acryldata/datahub-gms:v1.5.0.3
    container_name: deng-datahub-gms
    restart: unless-stopped
    depends_on:
      datahub-upgrade:
        condition: service_completed_successfully
    ports:
      - "8090:8080"
    environment:
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_URL: jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8&enabledTLSProtocols=TLSv1.2
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      GRAPH_SERVICE_IMPL: elasticsearch
      METADATA_SERVICE_AUTH_ENABLED: "false"
      DATAHUB_TOKEN_SERVICE_SIGNING_KEY: ${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      DATAHUB_TOKEN_SERVICE_SALT: ${DATAHUB_TOKEN_SERVICE_SALT}
      JAVA_OPTS: -Xms512m -Xmx1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --fail http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ---------------------------------------------------------------------------
  # DataHub Actions — event-driven automation (reacts to metadata changes)
  # ---------------------------------------------------------------------------
  datahub-actions:
    image: acryldata/datahub-actions:v1.5.0.3
    container_name: deng-datahub-actions
    restart: unless-stopped
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_SYSTEM_CLIENT_ID: __datahub-system
      DATAHUB_SYSTEM_CLIENT_SECRET: ${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      KAFKA_BOOTSTRAP_SERVER: datahub-broker:29092
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      METADATA_SERVICE_AUTH_ENABLED: "false"

  # ---------------------------------------------------------------------------
  # DataHub Frontend — web UI
  # Exposed on 9002 (no conflict with existing services)
  # ---------------------------------------------------------------------------
  datahub-frontend:
    image: acryldata/datahub-frontend-react:v1.5.0.3
    container_name: deng-datahub-frontend
    restart: unless-stopped
    depends_on:
      datahub-gms:
        condition: service_healthy
    ports:
      - "9002:9002"
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_SECRET: ${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      APP_VERSION: "1"
      AUTH_SESSION_TTL_HOURS: "24"
      MAX_SESSION_TOKEN_AGE: 24h
      DATAHUB_TOKEN_SERVICE_SIGNING_KEY: ${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      DATAHUB_TOKEN_SERVICE_SALT: ${DATAHUB_TOKEN_SERVICE_SALT}
      JAVA_OPTS: -Xms512m -Xmx512m -Dhttp.port=9002 -Dconfig.file=datahub-frontend/conf/application.conf -Djava.security.auth.login.config=datahub-frontend/conf/jaas.conf -Dlogback.configurationFile=datahub-frontend/conf/logback.xml -Dlogback.debug=false -Dpidfile.path=/dev/null
      METADATA_SERVICE_AUTH_ENABLED: "false"
    volumes:
      - /srv/deng-hydro-climate/datahub/user.props:/datahub-frontend/conf/user.props
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --fail http://localhost:9002/api/v2/auth/me || true"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
